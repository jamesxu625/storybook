<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>L1 原型 · 绘本乐高</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:"Microsoft YaHei","Segoe UI",sans-serif; background:#1a1a2e; color:#fff; height:100vh; overflow:hidden; user-select:none; }
  .screen { display:none; height:100vh; flex-direction:column; }
  .screen.active { display:flex; }

  .topbar { display:flex; align-items:center; padding:14px 20px; background:rgba(0,0,0,0.2); flex-shrink:0; }
  .topbar .title { font-size:16px; font-weight:600; flex:1; }
  .progress-dots { display:flex; gap:6px; }
  .pdot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.2); }
  .pdot.done { background:#4ade80; }
  .pdot.cur { background:#f59e0b; width:24px; border-radius:5px; }

  .body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }

  .big-btn { padding:16px 40px; border-radius:50px; border:none; background:#f59e0b; color:#fff; font-size:20px; font-weight:700; cursor:pointer; box-shadow:0 6px 20px rgba(245,158,11,0.4); transition:transform 0.15s; }
  .big-btn:active { transform:scale(0.95); }
  .big-btn.green { background:#22c55e; box-shadow:0 6px 20px rgba(34,197,94,0.4); }
  .big-btn.gray { background:rgba(255,255,255,0.12); box-shadow:none; }

  .card-grid { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; max-width:600px; }
  .card { width:150px; height:180px; border-radius:20px; background:rgba(255,255,255,0.08); border:3px solid transparent; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; transition:all 0.2s; }
  .card:hover, .card:active { border-color:#f59e0b; background:rgba(245,158,11,0.15); transform:scale(1.05); }
  .card .emoji { font-size:56px; }
  .card .label { font-size:15px; font-weight:600; }
  .card.sel { border-color:#f59e0b; background:rgba(245,158,11,0.2); }

  .char-card { width:120px; height:160px; border-radius:20px; background:rgba(255,255,255,0.08); border:3px solid transparent; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; }
  .char-card:hover { border-color:#f59e0b; transform:scale(1.05); }
  .char-card .emoji { font-size:64px; }
  .char-card .name { font-size:14px; }

  .name-chips { display:flex; gap:12px; margin-top:16px; }
  .chip { padding:10px 24px; border-radius:20px; background:rgba(255,255,255,0.1); border:2px solid transparent; cursor:pointer; font-size:16px; transition:all 0.2s; }
  .chip.sel { border-color:#f59e0b; background:rgba(245,158,11,0.2); }

  /* Story line question */
  .sl-q { font-size:22px; font-weight:600; margin-bottom:6px; text-align:center; }
  .sl-options { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin:16px 0; }
  .sl-opt { width:110px; height:130px; border-radius:18px; background:rgba(255,255,255,0.08); border:3px solid transparent; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; }
  .sl-opt:active { transform:scale(0.95); }
  .sl-opt.sel { border-color:#4ade80; background:rgba(34,197,94,0.15); }
  .sl-opt .emoji { font-size:44px; }
  .sl-opt .label { font-size:13px; }
  .sl-summary { display:flex; gap:8px; justify-content:center; margin:12px 0; flex-wrap:wrap; }
  .sl-tag { padding:6px 14px; border-radius:16px; background:rgba(245,158,11,0.2); border:1px solid #f59e0b; font-size:14px; }

  /* Magic animation */
  .magic { font-size:80px; animation:spin 1.5s linear infinite; }
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .magic-text { font-size:20px; margin-top:16px; opacity:0.8; }

  /* Page summary */
  .summary-box { background:rgba(245,158,11,0.15); border:2px solid #f59e0b; border-radius:20px; padding:30px 24px; max-width:400px; text-align:center; margin:20px 0; }
  .summary-box .page-num { font-size:13px; opacity:0.6; margin-bottom:8px; }
  .summary-box .summary-text { font-size:24px; font-weight:700; line-height:1.5; }

  /* Color palette */
  .palette { display:flex; gap:10px; justify-content:center; padding:14px; flex-wrap:wrap; }
  .color { width:44px; height:44px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:all 0.15s; }
  .color.sel { border-color:#fff; transform:scale(1.2); box-shadow:0 0 12px rgba(255,255,255,0.5); }

  .canvas-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:10px; }
  #colorCanvas { background:#fff; border-radius:16px; touch-action:none; max-width:100%; max-height:100%; }

  /* Story page */
  .story-page { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
  .story-img { width:220px; height:290px; border-radius:16px; background:#2a2a4e; display:flex; align-items:center; justify-content:center; font-size:70px; }
  .story-text { text-align:center; max-width:360px; }
  .story-text .zh { font-size:20px; font-weight:600; margin-bottom:6px; }
  .story-text .en { font-size:13px; opacity:0.6; }
  .audio-row { display:flex; gap:10px; }
  .audio-btn { padding:10px 20px; border-radius:24px; border:none; background:rgba(255,255,255,0.12); color:#fff; font-size:14px; cursor:pointer; }

  /* Done */
  .done-celebrate { font-size:64px; animation:bounce 1s infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-15px)} }
  .done-title { font-size:24px; font-weight:700; text-align:center; }
  .done-book-cover { width:160px; height:220px; border-radius:12px; background:linear-gradient(135deg,#f59e0b,#ef4444); display:flex; align-items:center; justify-content:center; font-size:60px; box-shadow:0 10px 30px rgba(0,0,0,0.5); margin:16px 0; }
  .done-btns { display:flex; flex-direction:column; gap:12px; margin-top:20px; }

  /* Page transition animation */
  .page-out { animation:pageOut 0.6s forwards; }
  @keyframes pageOut { to { opacity:0; transform:scale(0.7) translateY(-50px); } }
  .page-in { animation:pageIn 0.5s; }
  @keyframes pageIn { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }

  .hint { font-size:13px; opacity:0.4; margin-top:10px; text-align:center; }
  .protobadge { position:fixed; top:8px; right:8px; background:rgba(239,68,68,0.9); color:#fff; font-size:10px; padding:3px 8px; border-radius:10px; z-index:999; }
</style>
</head>
<body>
<div class="protobadge">PROTOTYPE v2</div>

<!-- ===== S1: Theme ===== -->
<div class="screen active" id="s1">
  <div class="topbar"><div class="title">📚 绘本乐高</div></div>
  <div class="body">
    <h2 style="font-size:24px;margin-bottom:8px;">今天搭什么故事？</h2>
    <p class="hint" style="margin-bottom:24px;">点一个你喜欢的！</p>
    <div class="card-grid">
      <div class="card" onclick="chooseTheme('dino','🦕','小恐龙去冒险')"><div class="emoji">🦕</div><div class="label">小恐龙去冒险</div></div>
      <div class="card" onclick="chooseTheme('car','🚗','小汽车旅行记')"><div class="emoji">🚗</div><div class="label">小汽车旅行记</div></div>
      <div class="card" onclick="chooseTheme('castle','🏰','公主与城堡')"><div class="emoji">🏰</div><div class="label">公主与城堡</div></div>
      <div class="card" onclick="chooseTheme('ocean','🐠','海底好朋友')"><div class="emoji">🐠</div><div class="label">海底好朋友</div></div>
    </div>
  </div>
</div>

<!-- ===== S2: Character ===== -->
<div class="screen" id="s2">
  <div class="topbar"><div class="title" id="s2title">🦕 小恐龙去冒险</div></div>
  <div class="body">
    <h2 style="font-size:22px;margin-bottom:6px;">选一个好朋友！</h2>
    <div class="card-grid" style="margin-top:20px;">
      <div class="char-card" onclick="chooseChar('green','🦖','绿色恐龙',this)"><div class="emoji">🦖</div><div class="name">绿色恐龙</div></div>
      <div class="char-card" onclick="chooseChar('pink','🦕','粉色恐龙',this)"><div class="emoji">🦕</div><div class="name">粉色恐龙</div></div>
      <div class="char-card" onclick="chooseChar('blue','🦎','蓝色恐龙',this)"><div class="emoji">🦎</div><div class="name">蓝色恐龙</div></div>
    </div>
    <div id="nameSection" style="display:none;margin-top:24px;text-align:center;">
      <p style="font-size:16px;margin-bottom:14px;">给它取个名字吧！</p>
      <div id="nameResult" style="font-size:28px;font-weight:700;color:#f59e0b;min-height:40px;margin-bottom:14px;"></div>
      <button class="big-btn" id="micBtn" onclick="startMic()" style="background:#ef4444;box-shadow:0 6px 20px rgba(239,68,68,0.4);">🎤 说名字</button>
      <p id="micHint" style="font-size:13px;opacity:0.5;margin-top:8px;">点按钮，大声说出你想叫它的名字！</p>
    </div>
    <button class="big-btn" id="startBtn" style="margin-top:30px;display:none;" onclick="goStoryLine()">开始搭故事！</button>
  </div>
</div>

<!-- ===== S3: Story Line (NEW) ===== -->
<div class="screen" id="s3">
  <div class="topbar"><div class="title">✨ 编故事</div></div>
  <div class="body">
    <div class="sl-summary" id="slSummary"></div>
    <div id="slContent"></div>
  </div>
</div>

<!-- ===== S4: Magic Animation ===== -->
<div class="screen" id="s4">
  <div class="body">
    <div class="magic">✨</div>
    <div class="magic-text" id="magicText">正在变魔法...</div>
  </div>
</div>

<!-- ===== S5: Page Summary (before coloring) ===== -->
<div class="screen" id="s5">
  <div class="topbar">
    <div class="title" id="s5title">第 1 页</div>
    <div class="progress-dots" id="s5dots"></div>
  </div>
  <div class="body" id="s5body">
    <div class="summary-box page-in" id="summaryBox">
      <div class="page-num" id="summaryNum">第 1 页</div>
      <div class="summary-text" id="summaryText">豆豆出发去森林啦！</div>
    </div>
    <button class="big-btn" onclick="goColor()">开始涂色 🎨</button>
  </div>
</div>

<!-- ===== S6: Coloring ===== -->
<div class="screen" id="s6">
  <div class="topbar">
    <div class="title">🎨 涂色时间</div>
    <button onclick="undoColor()" style="background:rgba(255,255,255,0.1);border:none;color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;">↩️ 撤销</button>
  </div>
  <div class="canvas-wrap"><canvas id="colorCanvas" width="320" height="400"></canvas></div>
  <div class="palette" id="palette"></div>
  <div style="padding:10px 20px 20px;text-align:center;">
    <button class="big-btn green" onclick="finishColoring()">✅ 完成涂色</button>
  </div>
</div>

<!-- ===== S7: Story Page (listen) ===== -->
<div class="screen" id="s7">
  <div class="topbar">
    <div class="title" id="s7title">第 1 页</div>
    <div class="progress-dots" id="s7dots"></div>
  </div>
  <div class="story-page" id="s7page">
    <div class="story-img" id="s7img">🦕🌲</div>
    <div class="story-text">
      <div class="zh" id="s7zh">豆豆走进了森林</div>
      <div class="en" id="s7en">Doudou walked into the forest</div>
    </div>
    <div class="audio-row">
      <button class="audio-btn" onclick="speak('zh')">🔊 中文</button>
      <button class="audio-btn" onclick="speak('en')">🔊 English</button>
    </div>
    <button class="big-btn" id="nextPageBtn" onclick="nextPage()">下一页 →</button>
  </div>
</div>

<!-- ===== S8: Done ===== -->
<div class="screen" id="s8">
  <div class="body">
    <div class="done-celebrate">🎉</div>
    <div class="done-title" id="doneTitle">豆豆的《小恐龙去冒险》<br>完成啦！</div>
    <div class="done-book-cover" id="doneCover">🦕</div>
    <div class="done-btns">
      <button class="big-btn" onclick="alert('原型演示：自动播放整本绘本')">▶️ 看我的书</button>
      <button class="big-btn green" onclick="alert('原型演示：生成二维码扫码可看')">📱 给爸爸妈妈看</button>
      <button class="big-btn gray" onclick="location.reload()">🆕 再做一本</button>
    </div>
  </div>
</div>

<script>
// ===== State =====
let theme='',themeEmoji='',themeName='';
let charColor='',charEmoji='',charName='';
let curPage=0;
const TOTAL_PAGES=4;
let storyLine={place:'',friend:'',activity:''};
let slStep=0;
let storyPages=[];

// Story line options
const SL_QUESTIONS=[
  {q:'去哪里？',opts:[{e:'🌲',l:'森林'},{e:'🏞️',l:'河边'},{e:'🏔️',l:'山洞'}]},
  {q:'去找谁？',opts:[{e:'🐰',l:'小兔子'},{e:'🐢',l:'小乌龟'},{e:'🐦',l:'小乌鸦'}]},
  {q:'去干什么？',opts:[{e:'🍎',l:'摘苹果'},{e:'🙈',l:'捉迷藏'},{e:'🌅',l:'看日落'}]}
];

// ===== Navigation =====
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

// S1
function chooseTheme(t,e,n){ theme=t;themeEmoji=e;themeName=n; document.getElementById('s2title').textContent=e+' '+n; show('s2'); }

// S2
function chooseChar(c,e,n,el){
  charColor=c;charEmoji=e;
  document.querySelectorAll('.char-card').forEach(x=>x.style.borderColor='');
  el.style.borderColor='#f59e0b';
  document.getElementById('nameSection').style.display='block';
}
function chooseName(el,n){ charName=n; document.getElementById('nameResult').textContent=n; document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel')); if(el) el.classList.add('sel'); document.getElementById('startBtn').style.display='inline-flex'; }

// Voice name input (Web Speech API)
var recog=null, recogActive=false;
function startMic(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('micHint').textContent='你的浏览器不支持语音，请选一个名字吧';
    return;
  }
  if(recogActive){ recog.stop(); return; }
  recog=new SR();
  recog.lang='zh-CN';
  recog.interimResults=true;
  recog.onstart=function(){
    recogActive=true;
    document.getElementById('micBtn').textContent='🔴 听ing...';
    document.getElementById('micBtn').style.background='#7f1d1d';
    document.getElementById('micHint').textContent='我在听...说出名字吧！';
  };
  recog.onresult=function(e){
    var text='';
    for(var i=e.resultIndex;i<e.results.length;i++) text+=e.results[i][0].transcript;
    // Clean up: strip common filler words a child might say ("我想叫它"/"叫"/"它叫")
    text=text.trim().replace(/^(我想|我要|就|它|他|她|叫|叫它|叫它叫|它的名字叫|名字叫)/g,'').trim();
    text=text.slice(0,8); // allow up to 8 chars
    document.getElementById('nameResult').textContent=text;
    if(e.results[e.results.length-1].isFinal && text){
      charName=text;
      document.getElementById('startBtn').style.display='inline-flex';
      document.getElementById('micHint').textContent='就叫 '+text+' 啦！';
      var nr=document.getElementById('nameResult');
      nr.style.animation='pop 0.5s'; setTimeout(function(){nr.style.animation='';},500);
      // Speak back so the child confirms by hearing, not reading
      speakText('就叫'+text+'啦！你好，'+text+'！','zh-CN');
    }
  };
  recog.onerror=function(){ document.getElementById('micHint').textContent='没听清，再说一次吧！'; };
  recog.onend=function(){
    recogActive=false;
    document.getElementById('micBtn').textContent='🎤 说名字';
    document.getElementById('micBtn').style.background='#ef4444';
  };
  recog.start();
}
function goStoryLine(){ slStep=0;storyLine={place:'',friend:'',activity:''}; show('s3'); renderSL(); }

// S3: Story Line
function renderSL(){
  const summaryEl=document.getElementById('slSummary');
  const tags=[];
  if(storyLine.place) tags.push('🌲 '+storyLine.place);
  if(storyLine.friend) tags.push('🐰 '+storyLine.friend);
  if(storyLine.activity) tags.push('🍎 '+storyLine.activity);
  summaryEl.innerHTML=tags.map(t=>'<div class="sl-tag">'+t+'</div>').join('');

  if(slStep>=3){
    document.getElementById('slContent').innerHTML='<div style="text-align:center;margin-top:20px;"><button class="big-btn" onclick="doMagic()">✨ 变魔法！</button></div>';
    return;
  }
  const q=SL_QUESTIONS[slStep];
  let html='<div class="sl-q">'+charName+'，'+q.q+'</div><div class="sl-options">';
  q.opts.forEach(o=>{
    html+='<div class="sl-opt" onclick="pickSL('+slStep+',\''+o.l+'\')"><div class="emoji">'+o.e+'</div><div class="label">'+o.l+'</div></div>';
  });
  html+='</div>';
  document.getElementById('slContent').innerHTML=html;
}
function pickSL(step,val){
  if(step===0) storyLine.place=val;
  else if(step===1) storyLine.friend=val;
  else if(step===2) storyLine.activity=val;
  slStep++;
  renderSL();
}

// S4: Magic
function doMagic(){
  show('s4');
  // Generate 4 pages based on story line
  storyPages=genStory();
  let dots=['.','..','...'];
  let i=0;
  const timer=setInterval(()=>{
    document.getElementById('magicText').textContent='正在变魔法'+dots[i%3];
    i++;
  },400);
  setTimeout(()=>{
    clearInterval(timer);
    curPage=0;
    show('s5'); renderSummary();
  },2500);
}

// Generate 4-page story from story line
function genStory(){
  const n=charName, p=storyLine.place, f=storyLine.friend, a=storyLine.activity;
  return [
    {summary:n+'出发去'+p+'啦！', zh:n+'开心地出发去'+p, en:n+' happily set off to the '+p, emoji:'🦕🌲'},
    {summary:n+'在'+p+'遇到了'+f, zh:n+'在'+p+'遇到了'+f, en:n+' met '+f+' at the '+p, emoji:'🦕🐰'},
    {summary:'他们一起'+a+'！', zh:'他们一起'+a+'，玩得好开心', en:'They '+a+' together, so much fun', emoji:'🐰🍎'},
    {summary:'太开心啦，好朋友抱一抱！', zh:'好朋友抱一抱，今天真开心', en:'Best friends hug, what a happy day', emoji:'🦕🐰💕'}
  ];
}

// S5: Page Summary
function renderSummary(){
  curPage++;
  const p=storyPages[curPage-1];
  document.getElementById('s5title').textContent='第 '+curPage+' 页';
  document.getElementById('summaryNum').textContent='第 '+curPage+' 页';
  document.getElementById('summaryText').textContent=p.summary;
  // dots
  let dots='';
  for(let i=0;i<TOTAL_PAGES;i++) dots+='<div class="pdot '+(i<curPage-1?'done':'')+(i===curPage-1?' cur':'')+'"></div>';
  document.getElementById('s5dots').innerHTML=dots;
  // animation
  const box=document.getElementById('summaryBox');
  box.classList.remove('page-in'); void box.offsetWidth; box.classList.add('page-in');
  // speak summary
  speakText(p.summary,'zh-CN');
}
function goColor(){ show('s6'); initCanvas(); }

// S6: Coloring
const COLORS=['#ef4444','#f97316','#facc15','#22c55e','#3b82f6','#a855f7','#ec4899','#92400e'];
let canvas,ctx,undoStack=[];
function initCanvas(){
  canvas=document.getElementById('colorCanvas');
  ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#333'; ctx.lineWidth=3; ctx.lineJoin='round';
  // simple scene lineart
  ctx.beginPath(); ctx.moveTo(0,340); ctx.lineTo(320,340); ctx.stroke();
  ctx.strokeRect(40,250,30,90);
  ctx.beginPath(); ctx.arc(55,230,45,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(270,70,35,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(130,80,25,0,Math.PI*2); ctx.arc(160,80,30,0,Math.PI*2); ctx.arc(190,80,25,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(200,290,50,40,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(170,260,25,0,Math.PI*2); ctx.stroke();
  ctx.strokeRect(180,320,15,20); ctx.strokeRect(210,320,15,20);
  ctx.beginPath(); ctx.arc(165,255,4,0,Math.PI*2); ctx.stroke();
  undoStack=[];
  document.getElementById('palette').innerHTML=COLORS.map((c,i)=>
    '<div class="color '+(i===0?'sel':'')+'" style="background:'+c+'" onclick="pickColor(\''+c+'\',this)"></div>').join('');
  curColor=COLORS[0];
}
let curColor='#ef4444';
function pickColor(c,el){ curColor=c; document.querySelectorAll('.color').forEach(e=>e.classList.remove('sel')); el.classList.add('sel'); }

document.getElementById('colorCanvas').addEventListener('pointerdown',function(e){
  if(!ctx) return;
  const rect=this.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const x=Math.round((e.clientX-rect.left)*sx);
  const y=Math.round((e.clientY-rect.top)*sy);
  undoStack.push(ctx.getImageData(0,0,canvas.width,canvas.height));
  floodFill(x,y,curColor);
});
function floodFill(x,y,fillColor){
  const w=canvas.width,h=canvas.height;
  const data=ctx.getImageData(0,0,w,h).data;
  const idx=(x,y)=>(y*w+x)*4;
  const si=idx(x,y);
  const tr=data[si],tg=data[si+1],tb=data[si+2];
  const fr=parseInt(fillColor.slice(1,3),16),fg=parseInt(fillColor.slice(3,5),16),fb=parseInt(fillColor.slice(5,7),16);
  if(tr===fr&&tg===fg&&tb===fb) return;
  const tol=40;
  const stack=[[x,y]]; const vis=new Uint8Array(w*h);
  while(stack.length){
    const [cx,cy]=stack.pop();
    if(cx<0||cx>=w||cy<0||cy>=h) continue;
    const vi=cy*w+cx; if(vis[vi]) continue; vis[vi]=1;
    const ci=idx(cx,cy);
    if(data[ci]<50&&data[ci+1]<50&&data[ci+2]<50) continue;
    if(Math.abs(data[ci]-tr)>tol||Math.abs(data[ci+1]-tg)>tol||Math.abs(data[ci+2]-tb)>tol) continue;
    data[ci]=fr;data[ci+1]=fg;data[ci+2]=fb;data[ci+3]=255;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(new ImageData(data,w,h),0,0);
}
function undoColor(){ if(undoStack.length) ctx.putImageData(undoStack.pop(),0,0); }
function finishColoring(){ show('s7'); renderStoryPage(); }

// S7: Story Page
function renderStoryPage(){
  const p=storyPages[curPage-1];
  document.getElementById('s7title').textContent='第 '+curPage+' 页';
  document.getElementById('s7img').textContent=p.emoji;
  document.getElementById('s7zh').textContent=p.zh;
  document.getElementById('s7en').textContent=p.en;
  let dots='';
  for(let i=0;i<TOTAL_PAGES;i++) dots+='<div class="pdot '+(i<curPage?'done':'')+(i===curPage-1?' cur':'')+'"></div>';
  document.getElementById('s7dots').innerHTML=dots;
  document.getElementById('nextPageBtn').textContent = curPage>=TOTAL_PAGES ? '✅ 完成！' : '下一页 →';
  // auto play zh
  setTimeout(()=>speak('zh'),500);
}

// Page transition with animation
function nextPage(){
  if(curPage>=TOTAL_PAGES){
    show('s8');
    document.getElementById('doneTitle').innerHTML=charName+'的《'+themeName+'》<br>完成啦！';
    document.getElementById('doneCover').textContent=themeEmoji;
    return;
  }
  // page out animation
  const page=document.getElementById('s7page');
  page.classList.add('page-out');
  // play ding sound
  playDing();
  setTimeout(()=>{
    page.classList.remove('page-out');
    show('s5');
    renderSummary();
  },600);
}

// S7 speak
function speak(lang){
  const text = lang==='zh' ? storyPages[curPage-1].zh : storyPages[curPage-1].en;
  speakText(text, lang==='zh'?'zh-CN':'en-US');
}
function speakText(text,lang){
  if('speechSynthesis' in window){
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang; u.rate=0.85;
    speechSynthesis.speak(u);
  }
}

// Ding sound (WebAudio)
var actx=null;
function playDing(){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine'; o.frequency.value=880;
    o.connect(g); g.connect(actx.destination);
    const t=actx.currentTime;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.2,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
    o.start(t); o.stop(t+0.3);
  }catch(e){}
}
